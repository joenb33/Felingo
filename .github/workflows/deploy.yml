# Deploy static site (Vite `dist/`) to your own server over SSH + rsync.
#
# Triggers:
#   • After "CI" succeeds on branch `main` (push or merge)
#   • Manually: Actions → Deploy → Run workflow
#
# Secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY   — PEM private key; add matching .pub to server ~/.ssh/authorized_keys
#   SSH_KNOWN_HOSTS   — output of: ssh-keyscan -H your.server.example
#   DEPLOY_USER       — SSH user (e.g. deploy)
#   DEPLOY_HOST       — hostname or IP
#   DEPLOY_PATH       — web root with trailing slash, e.g. /var/www/felingo/
#
# Server needs `rsync`. Point your vhost document root at DEPLOY_PATH.
#
# MP3s in public/audio/ are gitignored — rsync them once from your machine, or generate on the server with ElevenLabs (.env).

name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and rsync to server
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync dist/ to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: rsync -avz --delete -e ssh dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
