# Deploy static site (Vite `dist/`) over SSH using tar (works on hosts without rsync, e.g. Inleed shared).
#
# Default: manual only (Actions → Deploy → Run workflow) so the repo stays green
# until you add the secrets below.
#
# Optional — auto-deploy after every green CI on `main`:
#   1. Uncomment `workflow_run` under `on:`.
#   2. Uncomment `if:` on the `deploy` job (skips failed CI and non-main branches).
#
# Secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY   — PEM private key; add matching .pub to server ~/.ssh/authorized_keys
#   SSH_KNOWN_HOSTS   — ssh-keyscan (see below; Inleed webbhotell often needs -p 2020)
#   DEPLOY_USER       — SSH user (DirectAdmin username on Inleed shared hosting)
#   DEPLOY_HOST       — hostname, e.g. ns5.inleed.net or prime3.inleed.net (from Inleed)
#   DEPLOY_PATH       — web root with trailing slash, e.g. /home/user/domains/felingo.se/public_html/
#   DEPLOY_SSH_PORT   — optional; default 22. Inleed shared hosting usually 2020 (omit or set 2020)
#
# Server only needs `tar` + `ssh` (no rsync required on the host). Point vhost document root at DEPLOY_PATH.
#
# Visit counter (public/visit.php → dist/visit.php): create a writable directory NEXT TO the site root
# (sibling of public_html), named felingo_visitor_stats — deploy wipes DEPLOY_PATH only, so stats persist.
# Example: if DEPLOY_PATH is .../felingo.se/public_html/ then mkdir .../felingo.se/felingo_visitor_stats && chmod 750
#
# MP3s in public/audio/ are gitignored. Upload once to DEPLOY_PATH/audio/ — deploy removes everything
# in DEPLOY_PATH except the `audio/` folder so existing MP3s are kept across deploys.

name: Deploy

on:
  workflow_dispatch:
  # Uncomment after secrets are configured (deploys when CI succeeds on main):
  # workflow_run:
  #   workflows: [CI]
  #   types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to server
    runs-on: ubuntu-latest
    # Uncomment when `workflow_run` is enabled (required for correct filtering):
    # if: |
    #   github.event_name == 'workflow_dispatch' ||
    #   (github.event.workflow_run.conclusion == 'success' &&
    #    github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload dist/ via tar over SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          # Many shared hosts (e.g. Inleed) have no rsync for non-interactive SSH — tar + ssh works instead.
          # Keep audio/ (gitignored MP3s uploaded once on the server); wipe the rest before extracting dist.
          ssh -p "${PORT}" "${REMOTE}" "mkdir -p '${DEPLOY_PATH}' && cd '${DEPLOY_PATH}' && find . -mindepth 1 -maxdepth 1 ! -name 'audio' -exec rm -rf {} +"
          tar czf - -C dist . | ssh -p "${PORT}" "${REMOTE}" "tar xzf - -C '${DEPLOY_PATH}'"
